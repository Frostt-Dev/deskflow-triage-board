# render.yaml for DeskFlow backend deployment on Render
services:
  - type: web
    name: deskflow-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false      # will be set in Render dashboard
      - key: PORT
        value: "5000"
    # optional: specify region, e.g., us-west
    region: oregon
